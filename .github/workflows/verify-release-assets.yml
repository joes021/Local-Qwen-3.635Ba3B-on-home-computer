name: verify-release-assets

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-release-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(python3 - <<'PY'
import json
with open('version.json', 'r', encoding='utf-8') as f:
    print(json.load(f)['version'])
PY
)"
          fi

          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Wait for both release assets
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          python3 - <<'PY'
import json
import os
import sys
import time
import urllib.request

repo = os.environ["REPO"]
version = os.environ["VERSION"]
token = os.environ["GH_TOKEN"]
url = f"https://api.github.com/repos/{repo}/releases/tags/v{version}"
expected = {
    f"Local-Qwen-Setup-{version}.exe",
    f"Local-Qwen-Setup-latest.exe",
    f"Local-Qwen-Setup-{version}.run",
    f"Local-Qwen-Setup-latest.run",
}

deadline = time.time() + (20 * 60)
delay = 15
last_error = "release not ready yet"

while time.time() < deadline:
    request = urllib.request.Request(
        url,
        headers={
            "Accept": "application/vnd.github+json",
            "Authorization": f"Bearer {token}",
            "X-GitHub-Api-Version": "2022-11-28",
        },
    )

    try:
        with urllib.request.urlopen(request) as response:
            release = json.load(response)
    except Exception as exc:
        last_error = f"release lookup failed: {exc}"
        time.sleep(delay)
        continue

    names = {asset["name"] for asset in release.get("assets", [])}
    missing = sorted(expected - names)
    if not missing:
        print("Release asset verification passed.")
        print("Assets:")
        for name in sorted(names):
            if name in expected:
                print(f"- {name}")
        sys.exit(0)

    last_error = "missing assets: " + ", ".join(missing)
    print(last_error)
    time.sleep(delay)

print(f"Release asset verification failed for v{version}: {last_error}", file=sys.stderr)
sys.exit(1)
PY
